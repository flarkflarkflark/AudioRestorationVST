name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    name: Build and Create Release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: Linux
          - os: macos-latest
            artifact_name: macOS
          - os: windows-latest
            artifact_name: Windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libasound2-dev \
            libjack-jackd2-dev \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libwebkit2gtk-4.1-dev \
            libglu1-mesa-dev \
            mesa-common-dev \
            libgtk-3-dev \
            patchelf

      - name: Configure CMake
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            cmake -B build -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
              -DCMAKE_OSX_DEPLOYMENT_TARGET="13.0" \
              -DENABLE_ONNX_RUNTIME=ON \
              -DONNXRUNTIME_USE_COREML=ON
          else
            cmake -B build -DCMAKE_BUILD_TYPE=Release
          fi

      - name: Build
        run: cmake --build build --config Release

      # ===== Linux + macOS: Collect, Fix, and Zip =====
      - name: Collect and Zip plugin/standalone (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p release-files

          echo "=== Searching for VST3 and Standalone ==="
          PLUGIN=$(find build -name "*.vst3" | head -1)
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            STANDALONE=$(find build -type d -name "*.app" | head -1)
            LIB_NAME="libonnxruntime.dylib"
            LIB_PATTERN="libonnxruntime*.dylib"
            ARTIFACT_SUFFIX="Universal-Ventura"
          else
            # Look for binary in the Standalone_artefacts directory
            STANDALONE=$(find build -path "*Standalone_artefacts*" -type f -executable ! -name "*.so" ! -name "*.dylib" ! -name "cmake*" | head -1)
            LIB_NAME="libonnxruntime.so"
            LIB_PATTERN="libonnxruntime.so*"
            ARTIFACT_SUFFIX=""
          fi

          if [ -z "$ARTIFACT_SUFFIX" ]; then
            DISPLAY_NAME="${{ matrix.artifact_name }}"
          else
            DISPLAY_NAME="${{ matrix.artifact_name }}-$ARTIFACT_SUFFIX"
          fi

          # Function to fix shared library dependencies
          fix_deps() {
            local binary="$1"
            local l_name="$2"
            local l_pattern="$3"
            
            if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
              local lib_dir=$(find build -name "$l_name" -exec dirname {} \; | grep "onnxruntime/lib" | head -1)
              if [ -n "$lib_dir" ]; then
                cp -P "$lib_dir"/$l_pattern "$(dirname "$binary")/"
                patchelf --set-rpath '$ORIGIN' "$binary"
              fi
            elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
              local lib_src=$(find build -name "$l_name" | head -1)
              if [ -n "$lib_src" ]; then
                cp "$lib_src" "$(dirname "$binary")/"
                local old_path=$(otool -L "$binary" | grep "libonnxruntime" | awk '{print $1}')
                if [ -n "$old_path" ]; then
                  install_name_tool -change "$old_path" "@loader_path/$l_name" "$binary"
                fi
              fi
            fi
          }

          # Process VST3
          if [ -n "$PLUGIN" ]; then
            DEST="release-files/AudioRestoration-$DISPLAY_NAME.vst3"
            cp -R "$PLUGIN" "$DEST"
            if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
                INNER_BIN=$(find "$DEST" -type f -perm +111 ! -name "*.dylib" | head -1)
            else
                INNER_BIN=$(find "$DEST" -type f \( -name "*.so" -o -perm +111 \) ! -name "*.dylib" | head -1)
            fi
            
            if [ -n "$INNER_BIN" ]; then
              fix_deps "$INNER_BIN" "$LIB_NAME" "$LIB_PATTERN"
            fi
            cd release-files && zip -r "AudioRestoration-$DISPLAY_NAME-VST3.zip" "$(basename "$DEST")" && cd ..
          fi

          # Process Standalone
          if [ -n "$STANDALONE" ]; then
            DEST_NAME="AudioRestoration-$DISPLAY_NAME-Standalone"
            if [[ "$STANDALONE" == *.app ]]; then
               DEST_PATH="release-files/$DEST_NAME.app"
               cp -R "$STANDALONE" "$DEST_PATH"
               INNER_BIN=$(find "$DEST_PATH" -type f -perm +111 ! -name "*.dylib" | head -1)
               fix_deps "$INNER_BIN" "$LIB_NAME" "$LIB_PATTERN"
            else
               DEST_PATH="release-files/$DEST_NAME-Binary"
               mkdir -p "$DEST_PATH"
               cp "$STANDALONE" "$DEST_PATH/"
               STANDALONE_DIR=$(dirname "$STANDALONE")
               [ -d "$STANDALONE_DIR/models" ] && cp -R "$STANDALONE_DIR/models" "$DEST_PATH/"
               [ -d "$STANDALONE_DIR/kernels" ] && cp -R "$STANDALONE_DIR/kernels" "$DEST_PATH/"
               fix_deps "$DEST_PATH/$(basename "$STANDALONE")" "$LIB_NAME" "$LIB_PATTERN"
            fi
            
            cd release-files
            if [[ "${{ matrix.os }}" == "ubuntu-latest" && "$STANDALONE" != *.app ]]; then
               zip -r "AudioRestoration-$DISPLAY_NAME-Standalone.zip" "$(basename "$DEST_PATH")" libonnxruntime.so*
            else
               zip -r "AudioRestoration-$DISPLAY_NAME-Standalone.zip" "$(basename "$DEST_PATH")"
            fi
            cd ..
          fi

      - name: Upload Release Assets (Linux/macOS)
        if: matrix.os != 'windows-latest'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-files/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ===== Windows: Collect and Zip =====
      - name: Collect and Zip plugin/standalone (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-files -Force | Out-Null
          
          Write-Host "=== Searching for VST3 and Standalone ==="
          $plugin = Get-ChildItem -Recurse build -Include *.vst3 | Select-Object -First 1
          # Look for .exe in Standalone_artefacts directory to be more precise
          $standalone = Get-ChildItem -Recurse build -Include *.exe | Where-Object { ($_.FullName -like "*Standalone_artefacts*") -and ($_.Name -notlike "*cmake*") } | Select-Object -First 1
          
          if (-not $standalone) {
            # Fallback search if artefacts dir not found
            $standalone = Get-ChildItem -Recurse build -Include *.exe | Where-Object { ($_.Name -like "*Vinyl*Restoration*Suite*") -and ($_.Name -notlike "*cmake*") -and ($_.Name -notlike "*vst3*") } | Select-Object -First 1
          }

          Write-Host "Found plugin: $($plugin.FullName)"
          Write-Host "Found standalone: $($standalone.FullName)"
          
          # Copy and Zip VST3
          if ($plugin) {
            $destVst = "release-files/AudioRestoration-Windows.vst3"
            Copy-Item $plugin.FullName -Destination $destVst -Recurse -Force
            $zipPath = "release-files/AudioRestoration-Windows-VST3.zip"
            Compress-Archive -Path $destVst -DestinationPath $zipPath -Force
          }

          # Copy and Zip Standalone
          if ($standalone) {
            $destDir = "release-files/AudioRestoration-Windows-Standalone"
            New-Item -ItemType Directory -Path $destDir -Force | Out-Null
            $standaloneDir = Split-Path $standalone.FullName
            # Copy EVERYTHING from the folder where the .exe lives (DLLs, models, kernels)
            Copy-Item -Path "$standaloneDir\*" -Destination $destDir -Recurse -Force
            $zipPath = "release-files/AudioRestoration-Windows-Standalone.zip"
            Compress-Archive -Path $destDir -DestinationPath $zipPath -Force
          }

      - name: Upload Release Assets (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-files/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-container:
    name: Publish Container Image
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libasound2-dev \
            libjack-jackd2-dev \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libwebkit2gtk-4.1-dev \
            libglu1-mesa-dev \
            mesa-common-dev \
            libgtk-3-dev

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
